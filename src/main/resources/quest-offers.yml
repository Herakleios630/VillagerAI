      mode: wall
      label: "Mauerbau"
      intro: "Stein um Stein soll unser Dorf wachsen. Errichte eine Mauer, die den Feind zurueckhaelt."
      amount: 64
      cooldown-minutes: 2880
      difficulty-tier: 5
    - type: RETINUE_BELL
      mode: bell
      label: "Glocken-Stifter"
      intro: "Eine Glocke am Treffpunkt laeutet unseren Bund ein. Bringe mir eine Glocke herbei."
      cooldown-minutes: 2880
      difficulty-tier: 5

  legendary:
