      mode: golem
      label: "Golem-Wache"
      intro: "Ein eiserner Waerter wuerde dieses Dorf fuer Generationen schuetzen. Erschaffe einen Golem!"
      cooldown-minutes: 2880
      difficulty-tier: 5
