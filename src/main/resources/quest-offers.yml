      intro: "Legendarer Auftrag: Bringe mir 5 Lohenruten aus dem Nether, die wir fuer Grosses brauchen."
      difficulty-tier: 5
      cooldown-minutes: 140
    - type: LEGENDARY_END
      intro: "Legendarer Auftrag: Besorge eine seltene End-Beute fuer unser Dorf."
      difficulty-tier: 5
      cooldown-minutes: 140
    - type: LEGENDARY_NETHER
      intro: "Legendarer Auftrag: Bringe einen Nether-Stern oder Wither-Skelett-Schaedel – Beute aus den Tiefen der Hoelle."
      difficulty-tier: 5
      cooldown-minutes: 140