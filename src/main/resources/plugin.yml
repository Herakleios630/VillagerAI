name: VillagerAI
version: ${version}
main: de.ajsch.villagerai.VillageChiefPlugin
api-version: '1.21'
authors: [ajsch]
description: Village chief AI MVP for Paper.

commands:
  chief:
    description: Manage village chiefs and active conversations.
    usage: /chief <set|unset|info|exit|debug|quest|perimeter|reload|forget|whisper>
    permission: villagerai.chief
  whisper:
    description: Toggle whisper mode during active conversation.
    usage: /whisper [on|off]
    permission: villagerai.chief
  w:
    description: Toggle whisper mode during active conversation.
    usage: /w [on|off]
    permission: villagerai.chief

permissions:
  villagerai.chief:
    description: Allows chief administration commands.
    default: op
  villagerai.debugchat:
    description: Allows controlling the chat debug logging level.
    default: op